name: Release
on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  format:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_PAT }}
      - name: Install StyLua
        run: |
          STYLUA_VERSION="v2.0.2"
          curl -fsSL "https://github.com/JohnnyMorganz/StyLua/releases/download/${STYLUA_VERSION}/stylua-linux-x86_64.zip" \
            -o stylua.zip
          unzip stylua.zip -d /usr/local/bin
          chmod +x /usr/local/bin/stylua
      - name: Run StyLua
        run: stylua lua/
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lua/
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "style: auto-format with StyLua [skip ci]"
          git pull --rebase origin master
          git push

  vimdoc:
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'
    needs: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_PAT }}
      - name: Install lemmy-help
        run: |
          mkdir -p deps
          LEMMY_VERSION="v0.11.0"
          curl -fsSL "https://github.com/numToStr/lemmy-help/releases/download/${LEMMY_VERSION}/lemmy-help-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C deps/
          chmod +x deps/lemmy-help
      - name: Generate vimdoc
        run: scripts/gen_docs.sh
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add doc/colorizer.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: auto-generate vimdoc [skip ci]"
          git pull --rebase origin master
          git push

  pages:
    runs-on: ubuntu-latest
    needs: vimdoc
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua and LDoc
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 luarocks
          sudo luarocks install ldoc
      - name: Generate HTML docs
        run: scripts/gen_html.sh
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: doc/html
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
