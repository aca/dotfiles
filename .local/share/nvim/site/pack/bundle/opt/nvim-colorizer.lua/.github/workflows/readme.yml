name: README

on:
  push:
    branches: [master]
    paths:
      - "scripts/screenshots/configs.lua"
      - "scripts/readme/**"
  pull_request:
    branches: [master]
    paths:
      - "scripts/screenshots/configs.lua"
      - "scripts/readme/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  readme:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_PAT }}
      - name: Install Lua
        run: sudo apt-get install -y lua5.4
      - name: Generate SCREENSHOT_TESTS.md
        run: lua5.4 scripts/readme/gen_readme.lua
      - name: Commit and push
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SCREENSHOT_TESTS.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "docs: auto-generate SCREENSHOT_TESTS.md [skip ci]"
          git pull --rebase origin master
          git push
